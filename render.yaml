databases:
  - name: ss1-db
    databaseName: ss1_db
    user: ss1_user
    plan: free

redis:
  - name: ss1-redis
    plan: free
    ipAllowList: []

services:
  - type: web
    name: ss1-auth-service
    env: node
    plan: free
    rootDir: services/auth
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ss1-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: ss1-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: web
    name: ss1-affiliate-service
    env: node
    plan: free
    rootDir: services/affiliate
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        fromDatabase:
          name: ss1-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: ss1-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: web
    name: ss1-admin-service
    env: node
    plan: free
    rootDir: services/admin
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        fromDatabase:
          name: ss1-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: web
    name: ss1-gateway
    env: node
    plan: free
    rootDir: gateway
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 4000
      - key: AUTH_SERVICE_URL
        fromService:
          name: ss1-auth-service
          type: web
          property: host
      - key: AFFILIATE_SERVICE_URL
        fromService:
          name: ss1-affiliate-service
          type: web
          property: host
      - key: ADMIN_SERVICE_URL
        fromService:
          name: ss1-admin-service
          type: web
          property: host
      - key: JWT_SECRET
        sync: false
